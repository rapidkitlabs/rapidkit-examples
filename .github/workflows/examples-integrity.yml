name: Examples Integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-gate:
    name: Examples release gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python -m pip install poetry==2.4.1
      - run: npm run check
      - name: Restore RapidKit Core module payloads
        shell: bash
        run: |
          npm run hydrate:core -- \
            --workspace quickstart-workspace \
            --project product-api \
            --project ecommerce-api
          npm run hydrate:core -- \
            --workspace my-ai-workspace \
            --project ai-agent
          npm run hydrate:core -- \
            --workspace saas-starter-workspace \
            --project saas-api \
            --project saas-admin \
            --project saas-webhooks
      - name: Verify Python projects
        shell: bash
        env:
          DEBUG: 'false'
        run: |
          for project in \
            quickstart-workspace/product-api \
            quickstart-workspace/ecommerce-api \
            my-ai-workspace/ai-agent \
            saas-starter-workspace/saas-api \
            saas-starter-workspace/saas-admin \
            saas-starter-workspace/saas-webhooks
          do
            poetry --directory "$project" install --no-interaction
            poetry --directory "$project" run pytest -q
          done
      - name: Verify NestJS projects
        shell: bash
        run: |
          for project in \
            my-ai-workspace/ai-agent-nest \
            saas-starter-workspace/saas-nest
          do
            npm --prefix "$project" ci
            npm --prefix "$project" run build
            npm --prefix "$project" test -- --runInBand
          done
